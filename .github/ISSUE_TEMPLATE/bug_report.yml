name: Bug Report
description: Something is broken or crashing
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open ManyClaw
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: ManyClaw version
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.3"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / screenshots
      description: Paste any error messages or attach screenshots.
    validations:
      required: false
