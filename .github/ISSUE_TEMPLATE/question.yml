name: Question
description: Ask for help or clarification
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: What do you need help with?
      description: Describe your question. Include what you've already tried.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ManyClaw version (if relevant)
      placeholder: "0.0.1"
    validations:
      required: false
