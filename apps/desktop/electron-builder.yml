appId: com.openclaw.manyclaw
productName: ManyClaw

# Source: what gets included in the app
directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - package.json

asar: true

# macOS target
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  # Hardened runtime required for notarization
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing identity loaded from env: CSC_NAME=<your Developer ID name>
  # e.g. "Your Name (TEAMID)" — set in your shell or CI secrets, not here
  notarize: true

dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  sign: true

publish:
  provider: github
  owner: productvibe
  repo: manyclaw
