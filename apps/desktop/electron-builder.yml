appId: com.openclaw.manyclaw
productName: ManyClaw

# Source: what gets included in the app
directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - package.json

asar: true

# macOS target
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
  # Hardened runtime required for notarization
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing identity (from Keychain)
  identity: "SEVEN LABS AS (JS353BKF9P)"
  notarize: true

dmg:
  sign: true

# Don't publish yet
publish: null
