appId: com.openclaw.manyclaw
productName: ManyClaw

# Source: what gets included in the app
directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - package.json

asar: true

# macOS target
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
  # Hardened runtime required for notarization
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # When signing, set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID env vars
  notarize: false  # set to true when credentials are configured

dmg:
  sign: false

# Don't publish yet
publish: null
